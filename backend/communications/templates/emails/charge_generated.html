{% extends "emails/base.html" %}
{% block title %}Nova cobrança gerada{% endblock %}
{% block content %}
<p style="margin:0 0 16px;">Olá!</p>
<p style="margin:0 0 16px;">A sua assinatura do Clube Sonhos Literários expira em 10 dias. Um novo pagamento de <strong>R$ {{ amount }}</strong> foi gerado, com vencimento em <strong>{{ due_date }}</strong>.</p>
<p style="margin:24px 0 0;">
<a href="{{ frontend_url }}/billing" style="display:inline-block; background-color:#4430b0; color:#ffffff; text-decoration:none; padding:12px 24px; border-radius:8px; font-weight:bold;">Regularizar pagamento</a>
</p>
{% endblock %}
